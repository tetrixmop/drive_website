{% extends "base.html" %}

{% block title %}Вход | Водить.РФ{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow-[0_4px_24px_rgba(0,123,255,0.08)] p-8 w-full max-w-md border border-primary/10">
    <h2 class="text-center mb-8">Вход в систему</h2>
    
    <div id="error-box" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm text-center"></div>

    <form id="login-form" class="space-y-5">
        <div>
            <label class="block mb-1 font-medium text-metallic text-sm">Логин</label>
            <input type="text" id="login" required class="w-full px-4 py-2 border border-metallic/30 rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-whitebg">
        </div>
        
        <div>
            <label class="block mb-1 font-medium text-metallic text-sm">Пароль</label>
            <input type="password" id="password" required class="w-full px-4 py-2 border border-metallic/30 rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-whitebg">
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-accent text-white py-3 rounded-lg font-medium transition-colors shadow mt-4">
            Войти
        </button>
    </form>
    
    <p class="text-center mt-6 text-sm text-metallic">
        Нет аккаунта? <a href="/register" class="text-primary hover:text-accent font-medium transition-colors">Зарегистрироваться</a>
    </p>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const login = document.getElementById('login').value;
    const password = document.getElementById('password').value;
    const errorBox = document.getElementById('error-box');
    errorBox.classList.add('hidden');
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            window.location.href = '/admin';
        } else {
            errorBox.textContent = data.detail || 'Неверный логин или пароль';
            errorBox.classList.remove('hidden');
        }
    } catch (err) {
        errorBox.textContent = 'Ошибка сети';
        errorBox.classList.remove('hidden');
    }
});
</script>
{% endblock %}

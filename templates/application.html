{% extends "base.html" %}

{% block title %}Оформление заявки | Водить.РФ{% endblock %}

{% block content %}
<div
    class="bg-white rounded-2xl shadow-[0_4px_24px_rgba(0,123,255,0.08)] p-8 w-full max-w-4xl border border-primary/10">
    <h2 class="text-center mb-8">Оформление заявки на обучение</h2>

    <div id="error-box" class="hidden mb-4 p-3 bg-red-50 text-red-600 rounded-lg text-sm text-center"></div>
    <div id="success-box"
        class="hidden mb-4 p-3 bg-green-50 text-success rounded-lg text-sm font-medium text-center border border-success/20">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

        <!-- Блок выбора -->
        <form id="apply-form" class="space-y-5">
            <div>
                <label class="block mb-1 font-medium text-metallic text-sm">Вид транспорта</label>
                <select id="transport_id" required
                    class="w-full px-4 py-2 border border-metallic/30 rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-whitebg">
                    <option value="" disabled selected>Загрузка вариантов...</option>
                </select>
            </div>

            <div>
                <label class="block mb-1 font-medium text-metallic text-sm">Дата начала обучения</label>
                <input type="date" id="start_date" required
                    class="w-full px-4 py-2 border border-metallic/30 rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-whitebg">
            </div>

            <div>
                <label class="block mb-1 font-medium text-metallic text-sm">Способ оплаты</label>
                <select id="payment_method" required
                    class="w-full px-4 py-2 border border-metallic/30 rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-whitebg">
                    <option value="Банковская карта">Банковская карта</option>
                    <option value="СБП">СБП</option>
                    <option value="Наличными">Наличными</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-primary hover:bg-accent text-white py-3 rounded-lg font-medium transition-colors shadow mt-4">
                Отправить заявку
            </button>
        </form>

        <!-- Блок картинки -->
        <div
            class="flex flex-col items-center justify-center p-4 bg-primary/5 rounded-xl border border-primary/10 h-full min-h-[250px]">
            <span id="image-placeholder" class="text-metallic">Выберите транспорт</span>
            <img id="transport-image" src="" alt="Транспорт"
                class="hidden rounded-lg shadow-md max-h-[300px] object-cover transition-all" />
        </div>
    </div>
</div>

<script>
    let transports = [];

    const dateInput = document.getElementById('start_date');
    dateInput.min = new Date().toISOString().split('T')[0];

    const selectEl = document.getElementById('transport_id');
    const imgEl = document.getElementById('transport-image');
    const placeholderEl = document.getElementById('image-placeholder');

    async function loadTransports() {
        try {
            const res = await fetch('/api/transports');
            transports = await res.json();

            selectEl.innerHTML = '<option value="" disabled selected>Выберите транспорт</option>';
            transports.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                selectEl.appendChild(opt);
            });
        } catch (e) {
            console.error("Ошибка загрузки транспорта", e);
        }
    }
    loadTransports();

    selectEl.addEventListener('change', (e) => {
        const selectedId = e.target.value;
        const transport = transports.find(t => t.id == selectedId);
        if (transport) {
            imgEl.src = `/${transport.image_path}`;
            imgEl.classList.remove('hidden');
            placeholderEl.classList.add('hidden');
        }
    });

    document.getElementById('apply-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        errorBox.classList.add('hidden');
        successBox.classList.add('hidden');

        const payload = {
            transport_id: parseInt(document.getElementById('transport_id').value),
            start_date: document.getElementById('start_date').value,
            payment_method: document.getElementById('payment_method').value
        };

        if (!payload.transport_id) {
            errorBox.textContent = "Выберите транспорт";
            errorBox.classList.remove('hidden');
            return;
        }

        try {
            const response = await fetch('/api/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                successBox.textContent = 'Заявка успешно оформлена!';
                successBox.classList.remove('hidden');
                setTimeout(() => { window.location.href = '/dashboard'; }, 2000);
            } else {
                errorBox.textContent = data.detail || 'Ошибка отправки';
                errorBox.classList.remove('hidden');
            }
        } catch (err) {
            errorBox.textContent = 'Ошибка сети';
            errorBox.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
